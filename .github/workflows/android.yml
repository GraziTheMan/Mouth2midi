name: Android Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;26.1.10909125" "cmake;3.22.1"

      - name: Sync Capacitor web assets into android/
        run: npx cap sync android

      - name: Decode signing keystore
        id: signing
        env:
          KEYSTORE_B64: ${{ secrets.MOUTH2MIDI_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > "$RUNNER_TEMP/mouth2midi.keystore"
            echo "keystore=$RUNNER_TEMP/mouth2midi.keystore" >> "$GITHUB_OUTPUT"
            echo "Persistent signing keystore configured."
          else
            echo "No MOUTH2MIDI_KEYSTORE_BASE64 secret set — using per-run debug key."
          fi

      - name: Build debug APK
        working-directory: android
        env:
          MOUTH2MIDI_KEYSTORE_FILE: ${{ steps.signing.outputs.keystore }}
          MOUTH2MIDI_KEYSTORE_PASSWORD: ${{ secrets.MOUTH2MIDI_KEYSTORE_PASSWORD }}
          MOUTH2MIDI_KEY_ALIAS: ${{ secrets.MOUTH2MIDI_KEY_ALIAS }}
          MOUTH2MIDI_KEY_PASSWORD: ${{ secrets.MOUTH2MIDI_KEY_PASSWORD }}
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mouth2midi-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

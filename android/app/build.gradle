apply plugin: 'com.android.application'

android {
    namespace "com.grazitheman.mouth2midi"
    compileSdk rootProject.ext.compileSdkVersion
    ndkVersion rootProject.ext.ndkVersion
    defaultConfig {
        applicationId "com.grazitheman.mouth2midi"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        // S24 Ultra is arm64. Restricting the ABI keeps the native build fast.
        ndk {
            abiFilters 'arm64-v8a'
        }
        externalNativeBuild {
            cmake {
                cppFlags '-std=c++17'
                // Oboe's prefab package is built against the shared STL, so the
                // app must use c++_shared too (the NDK default is c++_static).
                arguments "-DANDROID_STL=c++_shared"
            }
        }
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        // Persistent signing so every CI build shares one signature and installs
        // as an update instead of failing with a signature mismatch. In CI these
        // env vars come from GitHub Secrets (see .github/workflows/android.yml).
        // When they are unset (local builds), this stays empty and Gradle falls
        // back to the SDK's auto-generated debug keystore.
        debug {
            def ksPath = System.getenv("MOUTH2MIDI_KEYSTORE_FILE")
            if (ksPath?.trim()) {
                storeFile file(ksPath)
                storePassword System.getenv("MOUTH2MIDI_KEYSTORE_PASSWORD")
                keyAlias System.getenv("MOUTH2MIDI_KEY_ALIAS")
                keyPassword System.getenv("MOUTH2MIDI_KEY_PASSWORD")
            }
        }
    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
    // Exposes the Oboe AAR's native headers/libs to CMake via find_package.
    buildFeatures {
        prefab true
    }
    externalNativeBuild {
        cmake {
            path "src/main/cpp/CMakeLists.txt"
            version "3.22.1"
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    implementation "com.google.oboe:oboe:$oboeVersion"
    // TensorFlow Lite — ships a prefab package so the native engine can link the
    // C++ API for the learned pitch detector (SPICE). See docs/ML-SPICE.md.
    implementation "org.tensorflow:tensorflow-lite:$tfliteVersion"
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
